<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/input.css">
</head>
<body>
    <div class="loginContainer">
        <div class="loginTitle">
            <h1>Login Container</h1>
        </div>
        <div class="inputContainer">
           <form action="/api/auth/login" method="POST">
            <div class="form-group">
                <label for="userEmail">Email</label>
                <input type="email" name="email" id="userEmail" placeholder="Email">
            </div>
            <div class="form-group">
                <label for="userPassword">Password</label>
                <input type="password" name="password" id="userPassword" placeholder="Password">
            </div>
            <div class="form-btn">
                <input type="submit" value="Submit">
            </div>
           </form>
           <div>
            <a href="/api/auth/google"><button id="googleBtn">Sign in with Google</button></a>
           </div>
            <div class="forgot_Password" style="margin-top: 10px;">
            Forgot: <a href="/confirmation-gmail">Reset password</a>
           </div>
           <div id="new_account" class="fpara">For new account: <a href="/register">register</a></div>
        </div>
    </div>
</body>
</html>
